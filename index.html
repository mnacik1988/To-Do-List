<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Мои задачи</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Мои задачи">
<meta name="theme-color" content="#f5f2ec" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1922" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

:root {
  --screen:#f5f2ec; --surface:#fff; --surface2:#ece7dd;
  --text:#2c2a26; --muted:#8c867b; --border:rgba(44,42,38,.09);
  --accent:#5f9b82; --accent-soft:#dcebe2; --accent-ink:#2f5e4a;
  --sage:#d3e6d8; --sage-ink:#3c6450;
  --rose:#ecd9d3; --rose-ink:#8a5446;
  --blue:#d6deeb; --blue-ink:#465a86;
  --pri-high:#e7b3a6; --pri-high-ink:#8a4133;
  --pri-mid:#ebd4a0;  --pri-mid-ink:#85652c;
  --pri-low:#bcd9c4;  --pri-low-ink:#3f6850;
}
[data-theme="dark"] {
  --screen:#1a1922; --surface:#252332; --surface2:#2e2b3d;
  --text:#ecebf2; --muted:#9b97ad; --border:rgba(255,255,255,.10);
  --accent:#74b79a; --accent-soft:#273a33; --accent-ink:#a9dcc6;
  --sage:#2f4a3e; --sage-ink:#bfe0cc;
  --rose:#4a3a38; --rose-ink:#e7c4ba;
  --blue:#34405e; --blue-ink:#bccbf0;
  --pri-high:#7d4338; --pri-high-ink:#f4cabf;
  --pri-mid:#6e5a2f;  --pri-mid-ink:#f0dca5;
  --pri-low:#3c5a47;  --pri-low-ink:#c0e0cc;
}

@keyframes pulse  { 0%{transform:scale(1);opacity:.45} 70%{transform:scale(2.1);opacity:0} 100%{opacity:0} }
@keyframes spin   { to{transform:rotate(360deg)} }
@keyframes fadein { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }
@keyframes sheetup{ from{transform:translateY(100%)} to{transform:none} }

#app {
  height:100%; background:var(--screen); display:flex; flex-direction:column;
  transition:background .3s; max-width:480px; margin:0 auto;
  position:relative; overflow:hidden;
}

.screen-header { padding:14px 18px 12px; flex:none; display:flex; align-items:center; justify-content:space-between; }
.screen-title   { font-size:22px; font-weight:800; color:var(--text); letter-spacing:-.02em; }
.screen-subtitle{ font-size:13px; color:var(--muted); margin-top:2px; font-weight:600; }
.hdr-btns { display:flex; gap:8px; align-items:center; }
.icon-btn {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--border);
  background:var(--surface); color:var(--text); cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex:none; transition:border-color .2s;
}
.icon-btn:hover { border-color:var(--accent); }
.icon-btn.active { border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink); }

.scroll-area {
  flex:1; overflow-y:auto; padding:0 18px 80px;
  display:flex; flex-direction:column; gap:14px; scrollbar-width:none;
}
.scroll-area::-webkit-scrollbar { display:none; }

.ai-card { background:var(--accent-soft); border-radius:16px; padding:15px 16px; }
.ai-card-hd { display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.ai-card-label { font-size:11px; font-weight:800; letter-spacing:.09em; color:var(--accent-ink); }
.ai-card-count { margin-left:auto; font-size:11px; font-weight:700; color:var(--accent-ink); opacity:.8; }
.ai-card-text  { font-size:13.5px; line-height:1.5; color:var(--text); text-wrap:pretty; }
.ai-proc-card  { display:flex; align-items:center; gap:11px; padding:16px; border-radius:16px; background:var(--accent-soft); color:var(--accent-ink); }
.ai-proc-card span { font-weight:700; font-size:14px; }

.tabs { display:flex; gap:5px; background:var(--surface2); padding:4px; border-radius:14px; }
.tab {
  flex:1; padding:9px 4px; border:none; border-radius:11px;
  background:transparent; font-family:inherit; font-weight:700; color:var(--muted); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  transition:background .15s,color .15s,box-shadow .15s;
}
.tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.10); }
.tab-label { font-size:12.5px; }
.tab-count { font-size:10px; font-weight:800; opacity:.7; }

.sec-hd { display:flex; align-items:center; gap:8px; padding:0 2px; }
.sec-title { font-size:15px; font-weight:800; color:var(--text); }
.sec-count { font-size:12px; font-weight:700; color:var(--muted); }

.task-list { display:flex; flex-direction:column; gap:9px; }

/* Normal task row */
.task-row {
  display:flex; align-items:stretch; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; overflow:hidden;
  transition:opacity .15s, background .15s;
}
.task-row.dragging { opacity:.3; }
.task-row.drag-over { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
.task-row.sel-active { background:var(--accent-soft); border-color:var(--accent); }

.pri-bar { width:7px; flex:none; border:none; cursor:pointer; padding:0; }
.pri-bar[data-pri="high"]{ background:var(--pri-high); }
.pri-bar[data-pri="mid"] { background:var(--pri-mid); }
.pri-bar[data-pri="low"] { background:var(--pri-low); }

.task-body { display:flex; align-items:center; gap:11px; padding:12px 12px 12px 11px; flex:1; min-width:0; }
.chk {
  flex:none; width:24px; height:24px; border-radius:8px; border:2px solid var(--border);
  background:transparent; display:flex; align-items:center; justify-content:center;
  color:#fff; cursor:pointer; padding:0; transition:background .15s,border-color .15s;
}
.chk.done { background:var(--accent); border-color:var(--accent); }
.task-name-zone { flex:1; display:flex; align-items:center; gap:7px; cursor:pointer; min-width:0; }
.task-text { flex:1; font-size:14.5px; font-weight:600; color:var(--text); line-height:1.3; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.task-text.done { text-decoration:line-through; color:var(--muted); opacity:.7; }
.chev { color:var(--muted); opacity:.5; flex:none; }
.pri-chip { flex:none; font-size:10px; font-weight:800; padding:4px 8px; border-radius:7px; }
.pri-chip[data-pri="high"]{ background:var(--pri-high); color:var(--pri-high-ink); }
.pri-chip[data-pri="mid"] { background:var(--pri-mid);  color:var(--pri-mid-ink); }
.pri-chip[data-pri="low"] { background:var(--pri-low);  color:var(--pri-low-ink); }

/* Drag handle */
.drag-handle {
  width:36px; flex:none; border:none; background:transparent;
  color:var(--muted); opacity:.35; cursor:grab; padding:0;
  display:flex; align-items:center; justify-content:center; touch-action:none;
}
.drag-handle:active { cursor:grabbing; opacity:.7; }

/* Select mode */
.sel-circle {
  flex:none; width:24px; height:24px; border-radius:50%; border:2px solid var(--border);
  background:transparent; display:flex; align-items:center; justify-content:center;
  color:#fff; transition:background .15s,border-color .15s;
}
.task-row.sel-active .sel-circle { background:var(--accent); border-color:var(--accent); }

/* Select action bar */
.select-bar {
  position:absolute; bottom:56px; left:0; right:0; z-index:5;
  background:var(--surface); border-top:1px solid var(--border);
  padding:10px 18px; display:flex; align-items:center; gap:10px;
}
.sel-count { flex:1; font-size:14px; font-weight:700; color:var(--text); }

/* Touch drag clone */
.touch-clone {
  position:fixed; pointer-events:none; z-index:200;
  opacity:.88; box-shadow:0 12px 32px rgba(0,0,0,.3);
  border-radius:14px; background:var(--surface); border:1px solid var(--accent);
}

/* FAB */
.fab-wrap { position:absolute; right:18px; bottom:76px; width:60px; height:60px; z-index:7; }
.fab-pulse { position:absolute; inset:0; border-radius:50%; background:var(--accent); animation:pulse 1.8s ease-out infinite; pointer-events:none; }
.fab-btn {
  position:relative; width:60px; height:60px; border-radius:50%;
  border:none; background:var(--accent); color:#fff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 14px 30px -6px rgba(0,0,0,.34); transition:filter .15s;
}
.fab-btn:hover { filter:brightness(1.06); }
.fab-stop { width:18px; height:18px; background:#fff; border-radius:4px; }
.fab-timer { position:absolute; bottom:-22px; left:50%; transform:translateX(-50%); font-size:11px; font-weight:700; color:var(--text); white-space:nowrap; }
.fab-transcript { position:absolute; bottom:-52px; left:50%; transform:translateX(-50%); font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; max-width:260px; overflow:hidden; text-overflow:ellipsis; background:var(--surface); padding:5px 10px; border-radius:20px; box-shadow:0 2px 10px rgba(0,0,0,.12); }

.bottom-nav {
  position:absolute; bottom:0; left:0; right:0; height:56px;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; z-index:6;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; border:none; background:transparent; cursor:pointer;
  color:var(--muted); font-family:inherit; font-size:10.5px; font-weight:700;
  transition:color .15s;
}
.nav-btn.active { color:var(--accent); }

/* Calendar */
.cal-view { flex:1; overflow-y:auto; padding:0 18px 80px; display:flex; flex-direction:column; scrollbar-width:none; }
.cal-view::-webkit-scrollbar { display:none; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; padding:4px 2px 16px; }
.cal-month-label { font-size:17px; font-weight:800; color:var(--text); }
.cal-nav-btn { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cal-nav-btn:hover { border-color:var(--accent); }
.cal-dow { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:8px; }
.cal-dow-cell { text-align:center; font-size:11px; font-weight:800; color:var(--muted); padding:4px 0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-cell { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:10px; cursor:pointer; transition:background .15s; position:relative; gap:3px; }
.cal-cell:hover { background:var(--surface2); }
.cal-cell.today .cal-num { background:var(--accent); color:#fff; }
.cal-cell.selected { background:var(--accent-soft); }
.cal-cell.selected .cal-num { color:var(--accent-ink); font-weight:800; }
.cal-cell.other-month { opacity:.3; pointer-events:none; }
.cal-num { font-size:13px; font-weight:700; color:var(--text); width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.cal-dots { display:flex; gap:2px; justify-content:center; height:6px; align-items:center; }
.cal-dot { width:5px; height:5px; border-radius:50%; flex:none; }
.cal-dot[data-pri="high"]{ background:var(--pri-high-ink); opacity:.7; }
.cal-dot[data-pri="mid"] { background:var(--pri-mid-ink);  opacity:.7; }
.cal-dot[data-pri="low"] { background:var(--pri-low-ink);  opacity:.7; }
.cal-dot.done { background:var(--muted); opacity:.4; }

.spin { animation:spin .8s linear infinite; }

/* Sheets / modals */
.overlay { position:absolute; inset:0; z-index:30; display:flex; flex-direction:column; justify-content:flex-end; }
.scrim   { position:absolute; inset:0; background:rgba(8,6,12,.46); }
.sheet   { position:relative; background:var(--surface); border-radius:26px 26px 0 0; max-height:92%; display:flex; flex-direction:column; box-shadow:0 -16px 44px -10px rgba(0,0,0,.45); }
.sheet-handle-bar { display:flex; justify-content:center; padding:10px 0 2px; flex:none; }
.sheet-handle { width:38px; height:4px; border-radius:3px; background:var(--border); }
.sheet-body { overflow-y:auto; padding:8px 20px 28px; display:flex; flex-direction:column; gap:15px; scrollbar-width:none; }
.sheet-body::-webkit-scrollbar { display:none; }

.modal-hd { display:flex; align-items:center; gap:8px; }
.sec-pill { font-size:11px; font-weight:800; padding:5px 11px; border-radius:20px; }
.sec-pill[data-sec="day"]  { background:var(--sage); color:var(--sage-ink); }
.sec-pill[data-sec="week"] { background:var(--rose); color:var(--rose-ink); }
.sec-pill[data-sec="month"]{ background:var(--blue); color:var(--blue-ink); }
.modal-chip { font-size:10.5px; font-weight:800; padding:5px 9px; border-radius:8px; }
.close-btn { margin-left:auto; width:31px; height:31px; border-radius:50%; border:none; background:var(--surface2); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.modal-task-title { font-size:20px; font-weight:800; color:var(--text); line-height:1.25; text-wrap:pretty; }
.field-label { font-size:10.5px; font-weight:800; letter-spacing:.07em; color:var(--muted); margin-bottom:6px; text-transform:uppercase; }
.modal-desc    { font-size:14px; line-height:1.55; color:var(--text); }
.modal-no-desc { font-size:14px; line-height:1.5; color:var(--muted); font-style:italic; }
.edit-hd-title { font-size:17px; font-weight:800; color:var(--text); }

.ai-block { border-radius:16px; padding:13px 14px; background:var(--accent-soft); }
.ai-block-inner { display:flex; align-items:center; gap:11px; }
.ai-mic-wrap { position:relative; width:42px; height:42px; flex:none; }
.ai-mic-pulse { position:absolute; inset:0; border-radius:50%; background:var(--accent); animation:pulse 1.8s ease-out infinite; pointer-events:none; }
.ai-mic-btn { position:relative; width:42px; height:42px; border-radius:50%; border:none; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.ai-mic-stop { width:13px; height:13px; background:#fff; border-radius:3px; }
.ai-text-col   { flex:1; min-width:0; }
.ai-text-title { font-size:13px; font-weight:800; color:var(--accent-ink); }
.ai-text-sub   { font-size:11.5px; color:var(--accent-ink); opacity:.85; line-height:1.4; }
.ai-text-st    { font-size:12px; font-weight:700; color:var(--accent-ink); }
.ai-note { margin-top:10px; padding:9px 11px; border-radius:11px; background:var(--surface); display:flex; align-items:center; gap:8px; }
.ai-note-text { font-size:12px; font-weight:700; color:var(--text); line-height:1.35; }

.modal-actions { display:flex; gap:10px; margin-top:2px; }
.btn-outline { flex:1; padding:13px; border-radius:14px; border:1.5px solid var(--border); background:transparent; color:var(--text); font-family:inherit; font-size:13.5px; font-weight:700; cursor:pointer; }
.btn-primary { flex:1; padding:13px; border-radius:14px; border:none; background:var(--accent); color:#fff; font-family:inherit; font-size:13.5px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
.btn-danger  { flex:1; padding:13px; border-radius:14px; border:1.5px solid var(--pri-high); background:transparent; color:var(--pri-high-ink); font-family:inherit; font-size:13.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }

.form-input    { width:100%; padding:12px 13px; border-radius:12px; border:1.5px solid var(--border); background:var(--screen); color:var(--text); font-family:inherit; font-size:15px; font-weight:600; outline:none; transition:border-color .15s; }
.form-input:focus { border-color:var(--accent); }
.form-textarea { width:100%; padding:12px 13px; border-radius:12px; border:1.5px solid var(--border); background:var(--screen); color:var(--text); font-family:inherit; font-size:14px; line-height:1.5; resize:none; outline:none; transition:border-color .15s; }
.form-textarea:focus { border-color:var(--accent); }
.form-date     { width:100%; padding:12px 13px; border-radius:12px; border:1.5px solid var(--border); background:var(--screen); color:var(--text); font-family:inherit; font-size:14px; font-weight:600; outline:none; transition:border-color .15s; cursor:pointer; }
.form-date:focus { border-color:var(--accent); }

.pri-picker { display:flex; gap:7px; }
.pri-pick-btn { flex:1; padding:11px 4px; border-radius:11px; border:none; font-family:inherit; font-size:12.5px; font-weight:800; cursor:pointer; transition:box-shadow .15s,opacity .15s; }
.pri-pick-btn[data-pri="high"]{ background:var(--pri-high); color:var(--pri-high-ink); }
.pri-pick-btn[data-pri="mid"] { background:var(--pri-mid);  color:var(--pri-mid-ink); }
.pri-pick-btn[data-pri="low"] { background:var(--pri-low);  color:var(--pri-low-ink); }
.pri-pick-btn.sel   { box-shadow:0 0 0 2.5px var(--text); }
.pri-pick-btn:not(.sel) { opacity:.42; }

/* Day sheet */
.day-sheet-date { font-size:18px; font-weight:800; color:var(--text); }
.day-task-item { display:flex; align-items:center; gap:11px; padding:12px 14px; background:var(--surface2); border-radius:12px; cursor:pointer; }
.day-task-dot { width:8px; height:8px; border-radius:50%; flex:none; }
.day-task-dot[data-pri="high"]{ background:var(--pri-high-ink); }
.day-task-dot[data-pri="mid"] { background:var(--pri-mid-ink); }
.day-task-dot[data-pri="low"] { background:var(--pri-low-ink); }
.day-task-text { flex:1; font-size:14px; font-weight:600; color:var(--text); line-height:1.3; }
.day-task-text.done { text-decoration:line-through; color:var(--muted); opacity:.7; }
.day-add-input { flex:1; padding:12px 13px; border-radius:12px; border:1.5px solid var(--border); background:var(--screen); color:var(--text); font-family:inherit; font-size:14px; font-weight:600; outline:none; transition:border-color .15s; }
.day-add-input:focus { border-color:var(--accent); }
.day-add-mic { width:48px; height:48px; border-radius:50%; border:none; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; flex:none; box-shadow:0 6px 16px -4px rgba(0,0,0,.25); }
.day-empty-hint { font-size:14px; color:var(--muted); line-height:1.5; font-style:italic; text-align:center; padding:8px 0; }

.info-box { padding:11px 13px; border-radius:12px; font-size:12px; line-height:1.5; font-weight:600; }
.info-box.ok  { background:var(--pri-low); color:var(--pri-low-ink); }
.info-box.err { background:var(--pri-high); color:var(--pri-high-ink); }
.ai-answer-card { background:var(--accent-soft); border:1.5px solid var(--accent); border-radius:16px; padding:15px 16px; animation:fadein .3s ease both; }
.ai-answer-card .ai-card-hd { margin-bottom:8px; }
.ai-answer-txt  { font-size:14.5px; line-height:1.6; color:var(--text); font-weight:600; }
.due-banner { background:var(--pri-high-ink); color:#fff; border-radius:16px; padding:14px 16px; animation:fadein .3s ease both; display:flex; flex-direction:column; gap:8px; }
.due-banner-hd { display:flex; align-items:center; gap:8px; }
.due-banner-title { font-size:12px; font-weight:800; letter-spacing:.07em; flex:1; }
.due-banner-close { width:26px; height:26px; border-radius:50%; border:none; background:rgba(255,255,255,.22); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:none; }
.due-banner-item { background:rgba(255,255,255,.15); border-radius:10px; padding:9px 12px; font-size:13.5px; font-weight:700; cursor:pointer; }
.due-banner-item-time { font-size:11px; font-weight:600; opacity:.8; margin-top:2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

/* ── Icons ── */
var IC = {
  mic: function(w,h){ return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/></svg>'; },
  check: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>',
  chev:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" class="chev"><path d="M9 6l6 6-6 6"/></svg>',

function callClaude(prompt, cb){
  fetch(WORKER_URL,{
    method:'POST',
    headers:{'content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:700,messages:[{role:'user',content:prompt}]})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.error){cb(new Error(data.error.message),null);return;}
    var text=((data.content||[])[0]||{}).text||'';
    var start=text.indexOf('{'); var end=text.lastIndexOf('}');
    if(start<0||end<0){cb(new Error('no-json'),null);return;}
    cb(null,JSON.parse(text.slice(start,end+1)));
  })
  .catch(cb);
}

/* ── Local date parser ── */
var DOW_RU_MAP={'понедельник':1,'вторник':2,'среда':3,'среду':3,'четверг':4,'пятница':5,'пятницу':5,'суббота':6,'субботу':6,'воскресенье':0};
var NUM_RU={'один':1,'одну':1,'два':2,'две':2,'три':3,'четыре':4,'пять':5,'шесть':6,'семь':7,'восемь':8,'девять':9,'десять':10};
function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function ruNumToInt(s){ var n=parseInt(s); return isNaN(n)?(NUM_RU[s]||1):n; }
function localParseDate(text){
  var t=text.toLowerCase(); var d=new Date(todayStr());
  if(t.indexOf('послезавтра')>=0){ d.setDate(d.getDate()+2); return fmtDate(d); }
  if(t.indexOf('завтра')>=0){ d.setDate(d.getDate()+1); return fmtDate(d); }
  if(t.indexOf('сегодня')>=0){ return todayStr(); }
  if(t.indexOf('через две недели')>=0){ d.setDate(d.getDate()+14); return fmtDate(d); }
  if(t.indexOf('через неделю')>=0){ d.setDate(d.getDate()+7); return fmtDate(d); }
  if(t.indexOf('через месяц')>=0){ d.setDate(d.getDate()+30); return fmtDate(d); }
  var m=t.match(/через\s+(\d+|[а-яё]+)\s+дн/);
  if(m){ d.setDate(d.getDate()+ruNumToInt(m[1])); return fmtDate(d); }
  var dm=t.match(/(\d{1,2})\s*[-–]?\s*(?:го|е|ое|числа)/);
  if(dm){ var day=parseInt(dm[1]); var cur=d.getDate(); var target=new Date(d.getFullYear(),d.getMonth(),day); if(day<cur) target.setMonth(target.getMonth()+1); return fmtDate(target); }
  for(var dow in DOW_RU_MAP){ if(t.indexOf(dow)>=0){ var tDow=DOW_RU_MAP[dow]; var cDow=d.getDay(); var diff=(tDow-cDow+7)%7; if(diff===0) diff=7; d.setDate(d.getDate()+diff); return fmtDate(d); } }
  return todayStr();
}
function localParseTime(text){
  var t=text.toLowerCase();
  var m=t.match(/в\s+(\d{1,2})[:.](\d{2})/);
  if(m) return pad(parseInt(m[1]))+':'+m[2];
  m=t.match(/в\s+(\d{1,2})\s*(?:час|утра|дня|вечера|ночи)/);
  if(m){ var h=parseInt(m[1]); if(t.indexOf('вечера')>=0&&h<12) h+=12; return pad(h)+':00'; }
  if(t.indexOf('полдень')>=0) return '12:00';
  if(t.indexOf('полночь')>=0) return '00:00';
  return '';
}
function localCleanText(text){
  var t=text;
  t=t.replace(/\d{1,2}\s*[-–]?\s*(?:го|е|ое)(?:\s+числа)?/gi,' ');
  t=t.replace(/числа/gi,' ');
  t=t.replace(/через\s+(?:две\s+недели|\d+\s+недели|неделю|месяц|\d+\s+дн[а-яё]*|[а-яё]+\s+дн[а-яё]*)/gi,' ');
  t=t.replace(/(?:послезавтра|завтра|сегодня)/gi,' ');
  t=t.replace(/в\s+(?:понедельник|вторник|среду|четверг|пятницу|субботу|воскресенье)/gi,' ');
  t=t.replace(/(?:понедельник|вторник|среду|четверг|пятницу|субботу|воскресенье)/gi,' ');
  t=t.replace(/в\s+\d{1,2}[:.]?\d{0,2}\s*(?:час[а-яё]*|утра|дня|вечера|ночи)?/gi,' ');
  t=t.replace(/в\s+(?:полдень|полночь)/gi,' ');
  t=t.replace(/\s+/g,' ').trim();
  t=t.replace(/^у\s+меня\s+/i,'');
  t=t.replace(/^я\s+/i,'');
  t=t.replace(/^(?:мне\s+(?:нужно|надо)\s+|нужно\s+|надо\s+)/i,'');
  t=t.trim();
  return t.charAt(0).toUpperCase()+t.slice(1);
}

function renderCalendar(){
  var year=state.calYear, month=state.calMonth;
  var firstDay=new Date(year,month,1);
  var startDow=firstDay.getDay(); startDow=(startDow+6)%7;
  var daysInMonth=new Date(year,month+1,0).getDate();
  var daysInPrev=new Date(year,month,0).getDate();
  var today=todayStr();
  var cells='';
  var totalCells=Math.ceil((startDow+daysInMonth)/7)*7;
  for(var i=0;i<totalCells;i++){
    var day,dateStr,otherMonth=false;
    if(i<startDow){ day=daysInPrev-startDow+i+1; var pm=month-1<0?11:month-1; var py=month-1<0?year-1:year; dateStr=py+'-'+pad(pm+1)+'-'+pad(day); otherMonth=true; }
    else if(i>=startDow+daysInMonth){ day=i-startDow-daysInMonth+1; var nm=month+1>11?0:month+1; var ny=month+1>11?year+1:year; dateStr=ny+'-'+pad(nm+1)+'-'+pad(day); otherMonth=true; }
    else{ day=i-startDow+1; dateStr=year+'-'+pad(month+1)+'-'+pad(day); }
    var isToday=dateStr===today;
    var isSel=dateStr===state.calSelected;
    var dayTasks=tasksForDate(dateStr);
    var cls='cal-cell'+(otherMonth?' other-month':'')+(isToday?' today':'')+(isSel?' selected':'');
    var dots=''; var shown=dayTasks.slice(0,3);
    for(var dd=0;dd<shown.length;dd++) dots+='<span class="cal-dot'+(shown[dd].done?' done':'')+'" data-pri="'+shown[dd].priority+'"></span>';
    cells+='<div class="'+cls+'" data-role="cal-day" data-date="'+dateStr+'">'+
      '<span class="cal-num">'+day+'</span>'+
      (dots?'<div class="cal-dots">'+dots+'</div>':'<div style="height:6px"></div>')+
    '</div>';
  }
  return '<div class="cal-view">'+
    '<div class="cal-nav">'+
      '<button class="cal-nav-btn" data-role="cal-prev">'+IC.chevL+'</button>'+
      '<span class="cal-month-label">'+MON_RU[month]+' '+year+'</span>'+
      '<button class="cal-nav-btn" data-role="cal-next">'+IC.chevRb+'</button>'+
    '</div>'+
    '<div class="cal-dow">'+DOW_RU.map(function(d){return '<span class="cal-dow-cell">'+d+'</span>';}).join('')+'</div>'+
    '<div class="cal-grid">'+cells+'</div>'+
  '</div>';
}

var EMPTY_HINTS={day:'Сегодня задач нет — нажмите микрофон, чтобы добавить голосом',week:'Задач на эту неделю нет',month:'Задач на этот месяц нет'};

          '<button class="icon-btn'+(activeTasks.length&&state.view==='list'?' ':' ')+'" data-role="enter-select" title="Выбрать задачи" style="'+(activeTasks.length&&state.view==='list'?'':'opacity:.4;pointer-events:none')+'">'+IC.sel+'</button>'+
          '<button class="icon-btn" data-role="toggle-theme">'+(state.theme==='light'?IC.moon:IC.sun)+'</button>'+

        '<button class="close-btn" style="margin-left:auto" data-role="close-answer">'+IC.close+'</button></div>'+

        :'<div class="ai-card"'+ss+'><div class="ai-card-hd">'+IC.spark('style="color:var(--accent-ink)"')+'<span class="ai-card-label">ИИ-РЕЗЮМЕ</span><span class="ai-card-count">'+totalTasks()+' задач</span></div><p class="ai-card-text">'+esc(state.summary)+'</p></div>')+
      answerCard+

      '<div class="tabs">'+TAB_META.map(function(m){

/* ── Actions ── */
function syncEdit(){ if(state.modalMode!=='edit'||!state.edit) return; var t=document.getElementById('edit-text'),d=document.getElementById('edit-desc'),dt=document.getElementById('edit-date'),dr=document.getElementById('edit-reminder'); if(t) state.edit.text=t.value; if(d) state.edit.desc=d.value; if(dt) state.edit.date=dt.value; if(dr) state.edit.reminderTime=dr.value; }
function syncDsInput(){ var el=document.getElementById('ds-input'); if(el) state.dsAddText=el.value; }

function toggleTheme(){ state.theme=state.theme==='light'?'dark':'light'; render(); }
function setTab(tab){ state.tab=tab; render(); }
function toggleDone(section,id){ state.sections[section]=state.sections[section].map(function(t){return t.id===id?Object.assign({},t,{done:!t.done}):t;}); render(); }
function cyclePri(section,id){ state.sections[section]=state.sections[section].map(function(t){ if(t.id!==id) return t; return Object.assign({},t,{priority:PRI_ORDER[(PRI_ORDER.indexOf(t.priority)+1)%3]}); }); render(); }

function openModal(section,id){ state.modal={section:section,id:id}; state.modalMode='view'; state.edit=null; state.aiRec=false; state.aiProc=false; state.aiNote=''; state.confirmDelete=false; anim.modal=true; render(); }
function closeModal(){
  if(aiTimeout){clearTimeout(aiTimeout);aiTimeout=null;}
  if(modalRecObj){modalRecObj.stop();modalRecObj=null;}
  state.modal=null; state.modalMode='view'; state.edit=null;
  state.aiRec=false; state.aiProc=false; state.aiNote=''; state.confirmDelete=false; render();
}
function startEdit(){ var task=currentTask(); if(!task) return; syncEdit(); state.modalMode='edit'; state.edit={text:task.text,desc:task.desc||'',priority:task.priority,date:task.date||'',reminderTime:task.reminderTime||''}; state.aiNote=''; render(); var el=document.getElementById('edit-text'); if(el) el.focus(); }
function cancelEdit(){ syncEdit(); state.modalMode='view'; state.edit=null; render(); }
function saveEdit(){
  syncEdit(); var m=state.modal,e=state.edit;
  if(m&&e){
    var text=(e.text||'').trim()||'Без названия';
    var newSec=e.date?dateToSection(e.date):m.section;
    var patch={text:text,desc:e.desc,priority:e.priority,date:e.date,reminderTime:e.reminderTime||''};
    if(newSec!==m.section){
      var updated=null;
      state.sections[m.section]=state.sections[m.section].filter(function(t){if(t.id===m.id){updated=Object.assign({},t,patch);return false;}return true;});
      if(updated) state.sections[newSec]=[updated].concat(state.sections[newSec]);
      state.modal=null;
    } else {
      state.sections[m.section]=state.sections[m.section].map(function(t){return t.id===m.id?Object.assign({},t,patch):t;});
    }
  }
  state.modalMode='view'; state.edit=null; render(); scheduleReminders(); syncRemindersToServer();
}
function setPri(pri){ syncEdit(); if(state.edit) state.edit.priority=pri; render(); }
function toggleDoneModal(){ var m=state.modal; if(m) toggleDone(m.section,m.id); else render(); }
function deleteTask(){ state.confirmDelete=true; render(); }
function confirmDeleteYes(){ var m=state.modal; if(!m){state.confirmDelete=false;render();return;} state.sections[m.section]=state.sections[m.section].filter(function(t){return t.id!==m.id;}); state.confirmDelete=false; closeModal(); }
function confirmDeleteNo(){ state.confirmDelete=false; render(); }

/* ── Select mode ── */
function enterSelectMode(){ state.selectMode=true; state.selected={}; render(); }
function exitSelectMode(){ state.selectMode=false; state.selected={}; render(); }
function toggleSelectTask(id,section){
  var s=Object.assign({},state.selected);
  if(s[id]) delete s[id]; else s[id]=section;
  state.selected=s; render();
}
function bulkDelete(){
  var ids=Object.keys(state.selected);
  if(!ids.length) return;
  for(var sec in state.sections){
    state.sections[sec]=state.sections[sec].filter(function(t){ return !state.selected[t.id]; });
  }
  state.selected={}; state.selectMode=false; render();
}

/* ── FAB + voice ── */
function onFabMic(){
  if(state.processing) return;
  if(!state.recording){
    state.recording=true; state.timer=0;
    timerIv=setInterval(function(){ state.timer++; var el=document.querySelector('.fab-timer'); if(el) el.textContent=fmtT(state.timer); },1000);
    if(SpeechRec){
      recTranscript='';
      var rec=new SpeechRec();
      rec.lang='ru-RU'; rec.continuous=true; rec.interimResults=true;
      rec.onresult=function(e){
        var interim='', final='';
        for(var i=0;i<e.results.length;i++){
          if(e.results[i].isFinal) final+=e.results[i][0].transcript;
          else interim+=e.results[i][0].transcript;
        }
        recTranscript=(final||interim).trim();
        var el=document.querySelector('.fab-timer,.fab-transcript');
        if(el){ el.className='fab-transcript'; el.textContent=recTranscript; }
      };
      rec.onerror=function(e){ if(e.error==='no-speech'||e.error==='aborted') return; clearInterval(timerIv); timerIv=null; state.recording=false; recObj=null; render(); };
      rec.onend=function(){ if(state.recording){ try{ rec.start(); }catch(e){ clearInterval(timerIv); timerIv=null; state.recording=false; recObj=null; render(); } } else { recObj=null; if(recTranscript){ state.processing=true; render(); processTranscript(recTranscript); } else render(); } };
      rec.start(); recObj=rec;
    }
    render();
  } else {
    clearInterval(timerIv); timerIv=null;
    if(recObj){ state.recording=false; recObj.stop(); }
    else{ state.recording=false; state.processing=true; render(); setTimeout(function(){ addTasksBatch([{text:'Тестовая задача',priority:'mid',date:todayStr()}]); },1200); }
  }
}

function processTranscript(transcript){
  var today=todayStr();
  var existingTasks=allTasks().map(function(t){return {text:t.text,date:t.date||''};});
  var prompt=
    'Сегодня '+today+'. Голосовое сообщение: "'+transcript+'".\n'+
    'Задачи пользователя: '+JSON.stringify(existingTasks)+'.\n\n'+
    'Определи: это добавление задач (одной или нескольких) — или вопрос/поиск по существующим задачам?\n\n'+
    'Если ДОБАВЛЕНИЕ — извлеки ВСЕ задачи из текста (их может быть несколько, разбей по датам).\n'+
    'Верни: {"type":"add","tasks":[{"text":"название без дат, времени и вводных слов","priority":"high|mid|low","date":"YYYY-MM-DD","reminderTime":"HH:MM или пустая строка если время не указано"}]}\n\n'+
    'Если ВОПРОС/ПОИСК — найди ответ в задачах пользователя и дай краткий ответ.\n'+
    'Верни: {"type":"query","answer":"текст ответа по-русски","section":"day|week|month или пусто"}\n\n'+
    'Верни ТОЛЬКО JSON, без лишнего текста.';
  callClaude(prompt,function(err,data){
    state.processing=false;
    if(err||!data||!data.type){
      var localDate=localParseDate(transcript);
      var localText=localCleanText(transcript)||transcript;
      var localTime=localParseTime(transcript);
      addTasksBatch([{text:localText,priority:'mid',date:localDate,reminderTime:localTime}]);
      return;
    }
    if(data.type==='add'&&data.tasks&&data.tasks.length){
      addTasksBatch(data.tasks);
    } else if(data.type==='query'){
      state.aiAnswer=data.answer||'Задача не найдена.';
      if(data.section&&state.sections[data.section]) state.tab=data.section;
      state.view='list';
      anim.summary=true; render();
    } else {
      var localDate=localParseDate(transcript);
      var localText=localCleanText(transcript)||transcript;
      var localTime=localParseTime(transcript);
      addTasksBatch([{text:localText,priority:'mid',date:localDate,reminderTime:localTime}]);
    }
  });
}

function addTasksBatch(tasks){
  if(!tasks||!tasks.length) return;
  var today=todayStr(); var lastSec='day';
  tasks.forEach(function(t){
    var date=t.date||today; var sec=dateToSection(date);
    var newTask=T(t.text,t.priority||'mid',false,'',date,t.reminderTime||'');
    state.sections[sec]=[newTask].concat(state.sections[sec]);
    anim.taskIds[newTask.id]=true; lastSec=sec;
  });
  state.aiAnswer=null;
  if(tasks.length===1) state.summary='Добавлена задача «'+tasks[0].text+'».';
  else state.summary='Добавлено '+tasks.length+' задач(и) — каждая в нужный день.';
  anim.summary=true; state.tab=lastSec; state.view='list'; render(); scheduleReminders(); syncRemindersToServer();
}

/* ── Modal AI ── */
function onAiMic(){
  if(state.aiProc) return;
  if(!state.aiRec){
    syncEdit(); state.aiRec=true; state.aiNote=''; render();
    if(SpeechRec){
      modalTranscript='';
      var rec=new SpeechRec();
      rec.lang='ru-RU'; rec.continuous=false; rec.interimResults=false;
      rec.onresult=function(e){ modalTranscript=e.results[0][0].transcript; };
      rec.onerror=function(){};
      rec.onend=function(){ if(state.aiRec){ state.aiRec=false; state.aiProc=true; modalRecObj=null; render(); aiApply(modalTranscript); } };
      rec.start(); modalRecObj=rec;
    }
  } else {
    syncEdit(); state.aiRec=false; state.aiProc=true;
    if(modalRecObj){ modalRecObj.stop(); modalRecObj=null; }
    else{ render(); aiTimeout=setTimeout(function(){aiApply('');},1800); }
    render(); if(modalTranscript) aiApply(modalTranscript);
  }
}

function aiApply(transcript){
  aiTimeout=null; var m=state.modal;
  if(!m){state.aiProc=false;render();return;}
  var isEdit=state.modalMode==='edit';
  var src=isEdit?(state.edit||{}):currentTask();
  if(!src){state.aiProc=false;render();return;}
  var today=todayStr();
  var prompt='Задача: "'+((src.text)||'')+'". Голосовая инструкция: "'+transcript+'". Сегодня '+today+'. Верни ТОЛЬКО JSON: {"text":"новое название","priority":"high|mid|low","desc":"описание или пустая строка","date":"YYYY-MM-DD или пустая строка"}.';
  callClaude(prompt,function(err,data){
    if(err||!data){ state.aiProc=false; state.aiNote='Ошибка соединения с Claude'; anim.aiNote=true; render(); }
    else applyEdit(data,isEdit,m,'ИИ применил изменения');
  });
}

function applyEdit(data,isEdit,m,note){
  if(isEdit){
    state.edit=Object.assign({},state.edit||{},{
      text:data.text||(state.edit||{}).text,
      desc:data.desc!=null?data.desc:(state.edit||{}).desc,
      priority:data.priority||(state.edit||{}).priority,
      date:data.date!=null?data.date:(state.edit||{}).date,
    });
  } else {
    state.sections[m.section]=state.sections[m.section].map(function(t){
      return t.id===m.id?Object.assign({},t,{text:data.text||t.text,desc:data.desc!=null?data.desc:t.desc,priority:data.priority||t.priority,date:data.date!=null?data.date:t.date}):t;
    });
  }
  state.aiProc=false; state.aiNote=note||'Изменения применены'; anim.aiNote=true; render();
}

/* ── Settings ── */
function openSettings(){ state.settings=true; render(); }
function closeSettings(){ state.settings=false; render(); }
function clearAllData(){ localStorage.removeItem(STORE_KEY); location.reload(); }

/* ── Calendar ── */
function calPrev(){ if(state.calMonth===0){state.calMonth=11;state.calYear--;}else state.calMonth--; render(); }
function calNext(){ if(state.calMonth===11){state.calMonth=0;state.calYear++;}else state.calMonth++; render(); }
function calSelectDay(date){ state.calSelected=date; openDaySheet(date); }

/* ── Day Sheet ── */
function openDaySheet(date){ state.daySheet={date:date}; state.dsAddText=''; state.dsAddPri='mid'; state.dsAiRec=false; state.dsAiProc=false; state.dsShowAdd=false; anim.daySheet=true; render(); }
function closeDaySheet(){ if(dsAiTimeout){clearTimeout(dsAiTimeout);dsAiTimeout=null;} if(dsRecObj){dsRecObj.stop();dsRecObj=null;} state.daySheet=null; state.dsShowAdd=false; state.dsAiRec=false; state.dsAiProc=false; render(); }
function dsSetPri(pri){ syncDsInput(); state.dsAddPri=pri; render(); }
function dsAddTask(){
  syncDsInput(); var text=(state.dsAddText||'').trim(); if(!text) return;
  var date=state.daySheet.date; var sec=dateToSection(date);
  var newTask=T(text,state.dsAddPri,false,'',date);
  anim.taskIds[newTask.id]=true;
  state.sections[sec]=[newTask].concat(state.sections[sec]);
  state.dsAddText=''; state.dsAddPri='mid'; state.dsShowAdd=false; render();
}
function onDsAiMic(){
  if(state.dsAiProc) return; syncDsInput();
  if(!state.dsAiRec){
    state.dsAiRec=true; render();
    if(SpeechRec){
      dsTranscript='';
      var rec=new SpeechRec();
      rec.lang='ru-RU'; rec.continuous=false; rec.interimResults=false;
      rec.onresult=function(e){ dsTranscript=e.results[0][0].transcript; };
      rec.onerror=function(){};
      rec.onend=function(){ if(state.dsAiRec){ state.dsAiRec=false; state.dsAiProc=true; dsRecObj=null; render(); dsFillFromTranscript(dsTranscript); } };
      rec.start(); dsRecObj=rec;
    }
  } else {
    state.dsAiRec=false; state.dsAiProc=true;
    if(dsRecObj){dsRecObj.stop();dsRecObj=null;}
    render(); dsFillFromTranscript(dsTranscript);
  }
}
function dsFillFromTranscript(transcript){
  var today=todayStr();
  if(transcript){
    var prompt='Из голосовой записи извлеки название задачи. Сегодня '+today+'. Верни ТОЛЬКО JSON: {"text":"название задачи","priority":"high|mid|low"}. Запись: "'+transcript+'"';
    callClaude(prompt,function(err,data){
      state.dsAiProc=false;
      if(err||!data){ state.dsAddText=localCleanText(transcript)||transcript; }
      else{ state.dsAddText=data.text||localCleanText(transcript)||transcript; state.dsAddPri=data.priority||state.dsAddPri; }
      render();
    });
  } else {
    state.dsAiProc=false; render();
  }
}

/* ── Drag-and-drop (desktop, HTML5) ── */
var appEl=document.getElementById('app');
appEl.addEventListener('dragstart',function(e){
  var row=e.target.closest('[data-role="task-row"]'); if(!row) return;
  drag={section:row.dataset.sec,id:row.dataset.id}; e.dataTransfer.effectAllowed='move'; render();
});
appEl.addEventListener('dragover',function(e){
  var row=e.target.closest('[data-role="task-row"]'); if(!row) return; e.preventDefault();
  var sec=row.dataset.sec,id=row.dataset.id; if(!drag||drag.section!==sec||drag.id===id) return;
  var arr=state.sections[sec].slice(); var from=-1,to=-1;
  for(var i=0;i<arr.length;i++){if(arr[i].id===drag.id)from=i;if(arr[i].id===id)to=i;}
  if(from<0||to<0) return; var moved=arr.splice(from,1)[0]; arr.splice(to,0,moved); state.sections[sec]=arr;
  var list=document.getElementById('task-list');
  if(list) list.innerHTML=arr.map(function(t){return renderTaskRow(t,sec);}).join('');
});
document.addEventListener('dragend',function(){ if(!drag) return; drag=null; render(); });

/* ── Touch drag (mobile) ── */
var touchDrag=null, touchClone=null;

appEl.addEventListener('touchstart',function(e){
  var handle=e.target.closest('[data-role="drag-handle"]'); if(!handle) return;
  var row=handle.closest('[data-role="task-row"]'); if(!row) return;
  var rect=row.getBoundingClientRect();
  touchDrag={section:handle.dataset.sec,id:handle.dataset.id,row:row,startY:e.touches[0].clientY,offsetY:e.touches[0].clientY-rect.top,targetId:null};
  touchClone=row.cloneNode(true);
  touchClone.className=touchClone.className+' touch-clone';
  touchClone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;z-index:200;';
  document.body.appendChild(touchClone);
  row.style.opacity='0.25';
},{passive:true});

document.addEventListener('touchmove',function(e){
  if(!touchDrag) return;
  e.preventDefault();
  var y=e.touches[0].clientY;
  touchClone.style.top=(y-touchDrag.offsetY)+'px';
  /* find target */
  var list=document.getElementById('task-list'); if(!list) return;
  var rows=list.querySelectorAll('[data-role="task-row"]');
  var targetId=null;
  rows.forEach(function(r){
    if(r.dataset.id===touchDrag.id) return;
    var rect=r.getBoundingClientRect();
    if(y>rect.top) targetId=r.dataset.id;
    r.style.borderBottom='';
  });
  if(targetId){ var tEl=list.querySelector('[data-id="'+targetId+'"]'); if(tEl) tEl.style.borderBottom='2px solid var(--accent)'; }
  touchDrag.targetId=targetId;
},{passive:false});

document.addEventListener('touchend',function(){
  if(!touchDrag) return;
  var sec=touchDrag.section; var arr=state.sections[sec].slice();
  var fromIdx=-1,toIdx=-1;
  for(var i=0;i<arr.length;i++){
    if(arr[i].id===touchDrag.id) fromIdx=i;
    if(arr[i].id===touchDrag.targetId) toIdx=i;
  }
  if(fromIdx>=0&&toIdx>=0&&fromIdx!==toIdx){
    var moved=arr.splice(fromIdx,1)[0];
    arr.splice(toIdx+(fromIdx<toIdx?0:1),0,moved);
    state.sections[sec]=arr;
  }
  if(touchClone){ touchClone.remove(); touchClone=null; }
  touchDrag=null; render();
},{passive:true});

/* ── Click delegation ── */
appEl.addEventListener('click',function(e){
  var el=e.target.closest('[data-role]'); if(!el) return;
  var role=el.dataset.role,id=el.dataset.id,sec=el.dataset.sec;
  switch(role){
    case 'toggle-theme':        toggleTheme(); break;
    case 'toggle-settings':     openSettings(); break;
    case 'settings-close':      closeSettings(); break;
    case 'settings-clear':      clearAllData(); break;
    case 'settings-notif':      requestNotifPermission(); break;
    case 'set-tab':             setTab(el.dataset.tab); break;
    case 'toggle-done':         toggleDone(sec,id); break;
    case 'cycle-pri':           cyclePri(sec,id); break;
    case 'open-modal':          openModal(sec,id); break;
    case 'open-modal-from-day': closeDaySheet(); setTimeout(function(){ openModal(sec,id); },50); break;
    case 'modal-close':         closeModal(); break;
    case 'start-edit':          startEdit(); break;
    case 'cancel-edit':         cancelEdit(); break;
    case 'save-edit':           saveEdit(); break;
    case 'set-pri':             setPri(el.dataset.pri); break;
    case 'toggle-done-modal':   toggleDoneModal(); break;
    case 'delete-task':         deleteTask(); break;
    case 'confirm-delete-yes':  confirmDeleteYes(); break;
    case 'confirm-delete-no':   confirmDeleteNo(); break;
    case 'fab-mic':             onFabMic(); break;
    case 'ai-mic':              onAiMic(); break;
    case 'nav-list':            state.view='list'; render(); break;
    case 'nav-cal':             state.view='calendar'; render(); break;
    case 'cal-prev':            calPrev(); break;
    case 'cal-next':            calNext(); break;
    case 'cal-day':             calSelectDay(el.dataset.date); break;
    case 'day-close':           closeDaySheet(); break;
    case 'ds-toggle-add':       syncDsInput(); state.dsShowAdd=true; render(); break;
    case 'ds-set-pri':          dsSetPri(el.dataset.pri); break;
    case 'ds-add-task':         dsAddTask(); break;
    case 'ds-ai-mic':           onDsAiMic(); break;
    case 'enter-select':        enterSelectMode(); break;
    case 'exit-select':         exitSelectMode(); break;
    case 'select-task':         toggleSelectTask(id,sec); break;
    case 'bulk-delete':         bulkDelete(); break;
    case 'close-answer':        state.aiAnswer=null; render(); break;
    case 'close-due-banner':    state.dueReminders=null; render(); break;
    case 'clear-reminder':      syncEdit(); if(state.edit) state.edit.reminderTime=''; render(); break;
    case 'drag-handle':         break; /* handled by touch/drag events */
  }
});

/* ── Keyboard ── */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(state.settings){closeSettings();return;}
    if(state.selectMode){exitSelectMode();return;}
    if(state.confirmDelete){confirmDeleteNo();return;}
    if(state.daySheet){closeDaySheet();return;}
    if(state.modal){closeModal();}
  }
});

/* ── Push-подписка ── */
function urlB64toUint8(str){
  str=str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='=';
  var raw=atob(str); var arr=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr;
}
function getDeviceId(){
  var id=localStorage.getItem('vtodo-device-id');
  if(!id){ id=Date.now().toString(36)+Math.random().toString(36).slice(2); localStorage.setItem('vtodo-device-id',id); }
  return id;
}
function subscribePush(){
  if(!VAPID_PUBLIC_KEY||!('PushManager' in window)||!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(function(reg){
    reg.pushManager.getSubscription().then(function(existing){
      var send=function(sub){
        fetch(WORKER_URL+'/subscribe',{method:'POST',headers:{'content-type':'application/json'},
          body:JSON.stringify({userId:getDeviceId(),subscription:sub.toJSON()})
        }).catch(function(){});
      };
      if(existing){ send(existing); return; }
      if(Notification.permission!=='granted') return;
      reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64toUint8(VAPID_PUBLIC_KEY)})
        .then(send).catch(function(e){ console.log('Push subscribe:',e); });
    });
  });
}
function syncRemindersToServer(){
  if(!VAPID_PUBLIC_KEY||!navigator.onLine) return;
  var userId=getDeviceId();
  allTasks().forEach(function(task){
    if(task.reminderTime&&task.date&&!task.done){
      fetch(WORKER_URL+'/remind',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({userId:userId,taskId:task.id,text:task.text,date:task.date,reminderTime:task.reminderTime})
      }).catch(function(){});
    } else {
      fetch(WORKER_URL+'/unremind',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({userId:userId,taskId:task.id})
      }).catch(function(){});
    }
  });
}

/* ── Notifications + Service Worker ── */
var FIRED_KEY = 'vtodo-fired';

function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){ subscribePush(); render(); return; }
  if(Notification.permission==='default'){
    Notification.requestPermission().then(function(p){ if(p==='granted'){ subscribePush(); render(); } });
  }
}

function getFired(){ try{ return JSON.parse(localStorage.getItem(FIRED_KEY)||'{}'); }catch(e){ return {}; } }
function markFired(taskId, rt){ var f=getFired(); f[taskId+':'+rt]=Date.now(); try{ localStorage.setItem(FIRED_KEY,JSON.stringify(f)); }catch(e){} }

/* Проверка напоминаний — окно 24 часа, баннер всегда, системное если разрешено */
function checkReminders(){
  var now=Date.now(); var fired=getFired(); var due=[];
  allTasks().forEach(function(task){
    if(!task.reminderTime||!task.date||task.done) return;
    var key=task.id+':'+task.reminderTime;
    if(fired[key]) return;
    var ts=new Date(task.date+'T'+task.reminderTime).getTime();
    if(ts<=now && ts>now-86400000){ due.push(task); markFired(task.id,task.reminderTime); }
  });
  if(!due.length) return;
  /* Системное уведомление если разрешено */
  if(Notification.permission==='granted'){
    due.forEach(function(task){
      try{ new Notification(task.text,{body:'Напоминание · '+dateLabel(task.date)+' '+task.reminderTime,icon:'icon.png',tag:task.id}); }catch(e){}
    });
  }
  /* Баннер внутри приложения — всегда */
  state.dueReminders=due; render();
}

setInterval(checkReminders, 30000);
document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') checkReminders(); });

/* Передаём напоминания в SW для фонового режима */
function scheduleReminders(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(function(reg){
    if(!reg.active) return;
    var list=allTasks()
      .filter(function(t){ return t.reminderTime&&t.date&&!t.done; })
      .map(function(t){
        var dt=new Date(t.date+'T'+t.reminderTime);
        var d=new Date(t.date); var ds=d.getDate()+' '+['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
        return {id:t.id,text:t.text,sub:'Напоминание • '+ds,ts:dt.getTime()};
      })
      .filter(function(r){ return r.ts>Date.now(); });
    reg.active.postMessage({type:'SCHEDULE',list:list});
  });
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    swReg=reg;
    navigator.serviceWorker.ready.then(function(r){ swReg=r; scheduleReminders(); });
  }).catch(function(){});
}

/* ── Init ── */
loadStorage();
render();
subscribePush();
checkReminders();
</script>
